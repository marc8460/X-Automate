<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --background: #0d0b14;
      --card: #15121e;
      --primary: #a855f7;
      --accent: #ec4899;
      --foreground: #f8fafc;
      --muted: #64748b;
      --border: #2e2840;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 18px;
    }

    .app-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .status-card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
    }

    .value {
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot.connected {
      background-color: #22c55e;
      box-shadow: 0 0 8px #22c55e80;
    }

    .dot.disconnected {
      background-color: #ef4444;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .button {
      display: block;
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--foreground);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title .count {
      font-weight: 400;
      color: var(--muted);
      font-size: 12px;
    }

    .watchlist-section {
      margin-bottom: 16px;
    }

    .watchlist-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .watchlist-input {
      flex: 1;
      padding: 8px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--foreground);
      font-size: 13px;
      outline: none;
    }

    .watchlist-input:focus {
      border-color: var(--primary);
    }

    .watchlist-input::placeholder {
      color: var(--muted);
    }

    .track-btn {
      padding: 8px 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .track-btn:hover {
      opacity: 0.9;
    }

    .watchlist-list {
      max-height: 120px;
      overflow-y: auto;
    }

    .watchlist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .watchlist-item .username {
      color: var(--primary);
      font-weight: 500;
    }

    .watchlist-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }

    .watchlist-remove:hover {
      color: #ef4444;
    }

    .watchlist-empty {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">A</div>
      <div class="app-name">Aura</div>
    </div>

    <div class="status-card">
      <div class="status-item">
        <span class="label">Aura Dashboard</span>
        <span class="value" id="dashboard-status">
          <span class="dot disconnected"></span>
          Disconnected
        </span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="posts-count">0</div>
        <div class="stat-label">X posts today via extension</div>
      </div>
    </div>

    <div class="watchlist-section">
      <div class="section-title">
        <span>Creator Monitor</span>
        <span class="count" id="watchlist-count">0 tracked</span>
      </div>
      <div class="watchlist-input-row">
        <input type="text" class="watchlist-input" id="watchlist-input" placeholder="@username" />
        <button class="track-btn" id="watchlist-add-btn">Track</button>
      </div>
      <div class="watchlist-list" id="watchlist-list"></div>
    </div>

    <button id="open-dashboard" class="button">Open Aura Dashboard</button>

    <div class="footer">
      Aura Social Assistant v1.0.0
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
